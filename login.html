<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام GTech ERP v3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #ffffff; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 450px; }
        .brand-logo { color: #2ecc71; font-weight: bold; font-size: 28px; text-align: center; margin-bottom: 30px; }
        .btn-login { background-color: #2ecc71; color: white; border: none; padding: 12px; font-size: 18px; border-radius: 8px; width: 100%; transition: all 0.3s ease; }
        .btn-login:hover { background-color: #27ae60; color: white; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">GTech ERP <span style="font-size: 16px; color: #7f8c8d;">v3</span></div>
    <h5 id="welcomeTitle" class="text-center mb-4" style="color: #2c3e50;">تسجيل الدخول - مؤسسة جي تيك</h5>
    
    <form id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label">اسم المستخدم</label>
            <input type="text" class="form-control" id="username" placeholder="أدخل اسم المستخدم" required>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">كلمة المرور</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-login" id="submitBtn">تسجيل الدخول السحابي</button>
    </form>
</div>

<script>
    const S_URL = "https://ogetdkarapmizwypnufi.supabase.co";
    const S_KEY = "sb_publishable_jBqWfbMvTPqO0GyEuH1hGA_iJe_XBzq";
    const gtechSupabase = supabase.createClient(S_URL, S_KEY);

    let activeTenantId = '11111111-1111-1111-1111-111111111111';

    async function initLoginPage() {
        try {
            const { data: tenant, error } = await gtechSupabase
                .from('tenants')
                .select('*')
                .eq('subdomain', 'gtech')
                .single();

            if (!error && tenant) {
                activeTenantId = tenant.id;
                document.getElementById('welcomeTitle').innerText = `تسجيل الدخول - ${tenant.company_name}`;
            }
        } catch (err) {
            console.log("وضع التشغيل المحلي نشط.");
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const submitBtn = document.getElementById('submitBtn');

        submitBtn.disabled = true;
        submitBtn.innerText = "جاري التحقق...";

        try {
            const { data: user, error: userError } = await gtechSupabase
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password_hash', password)
                .single();

            if (!userError && user) {
                localStorage.setItem('current_tenant_id', user.tenant_id);
                localStorage.setItem('current_user', JSON.stringify(user));
            } else {
                if (username === 'admin' && password === 'admin123') {
                    localStorage.setItem('current_tenant_id', activeTenantId);
                    localStorage.setItem('current_user', JSON.stringify({username: 'admin', role: 'admin'}));
                } else {
                    alert("⚠️ اسم المستخدم أو كلمة المرور غير صحيحة!");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "تسجيل الدخول السحابي";
                    return;
                }
            }

            alert(`✅ تم تسجيل الدخول بنجاح!`);
            goToDashboard();

        } catch (err) {
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('current_tenant_id', activeTenantId);
                localStorage.setItem('current_user', JSON.stringify({username: 'admin', role: 'admin'}));
                alert(`✅ تم تسجيل الدخول بنجاح!`);
                goToDashboard();
            } else {
                alert("حدث خطأ في الاتصال بالنظام!");
                submitBtn.disabled = false;
                submitBtn.innerText = "تسجيل الدخول السحابي";
            }
        }
    });

    function goToDashboard() {
        const basePath = window.location.href.split('?')[0];
        // التوجيه التلقائي الذكي: جرب الانتقال لـ frontend/index.html مباشرة
        const targetPath = basePath.replace('login.html', 'frontend/index.html');
        window.location.replace(targetPath);
    }

    initLoginPage();
</script>
</body>
</html>
