<script>
    // ⚠️ تأكد من مطابقة هذه المفاتيح بنسبة 100% من لوحة تحكم Supabase عندك
    const S_URL = "https://ogetdkarapmizwypnufi.supabase.co";
    const S_KEY = "ضعه هنا لو كان مختلفاً عن المفتاح الحالي"; 
    
    const gtechSupabase = supabase.createClient(S_URL, S_KEY);

    let activeTenantId = '11111111-1111-1111-1111-111111111111';

    async function initLoginPage() {
        try {
            const { data: tenant, error } = await gtechSupabase
                .from('tenants')
                .select('*')
                .eq('subdomain', 'gtech')
                .single();

            if (!error && tenant) {
                activeTenantId = tenant.id;
                document.getElementById('welcomeTitle').innerText = `تسجيل الدخول - ${tenant.company_name}`;
            }
        } catch (err) {
            console.log("وضع التشغيل المحلي أو خطأ API.");
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const submitBtn = document.getElementById('submitBtn');

        submitBtn.disabled = true;
        submitBtn.innerText = "جاري التحقق...";

        // حل الدخول الافتراضي السريع (Admin الحساب المحلي) لتخطي مشاكل الـ API مؤقتاً
        if (username === 'admin' && password === 'admin123') {
            localStorage.setItem('current_tenant_id', activeTenantId);
            localStorage.setItem('current_user', JSON.stringify({username: 'admin', role: 'admin'}));
            alert(`✅ تم تسجيل الدخول بنجاح (حساب المسؤول)!`);
            goToDashboard();
            return;
        }

        try {
            const { data: user, error: userError } = await gtechSupabase
                .from('users')
                .select('*')
                .eq('username', username)
                .eq('password_hash', password)
                .single();

            if (!userError && user) {
                localStorage.setItem('current_tenant_id', user.tenant_id);
                localStorage.setItem('current_user', JSON.stringify(user));
                alert(`✅ تم تسجيل الدخول بنجاح!`);
                goToDashboard();
            } else {
                alert("⚠️ اسم المستخدم أو كلمة المرور غير صحيحة أو السيرفر رفض الطلب!");
                submitBtn.disabled = false;
                submitBtn.innerText = "تسجيل الدخول السحابي";
            }

        } catch (err) {
            alert("حدث خطأ في الاتصال بالنظام (406 Not Acceptable). تأكد من صلاحية الـ API Key.");
            submitBtn.disabled = false;
            submitBtn.innerText = "تسجيل الدخول السحابي";
        }
    });

    function goToDashboard() {
        const basePath = window.location.href.split('?')[0];
        const targetPath = basePath.replace('login.html', 'dashboard.html');
        window.location.replace(targetPath);
    }

    initLoginPage();
</script>
