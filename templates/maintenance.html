<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>صيانة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:48px 40px;max-width:440px;width:90%;text-align:center}
h1{font-size:22px;margin:16px 0 10px}
p{color:#94a3b8;line-height:1.7;font-size:15px}
.sub{margin-top:14px;font-size:13px;color:#64748b}
</style></head>
<body><div class="card">
  <div style="font-size:56px">🔧</div>
  <h1>النظام في وضع الصيانة</h1>
  <p>يخضع النظام حالياً للصيانة الدورية. يُرجى المحاولة بعد قليل.</p>
  <p class="sub">للاستفسار العاجل تواصل مع الدعم الفني</p>
</div></body></html>
