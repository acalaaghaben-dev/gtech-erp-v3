<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>النظام موقوف</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:48px 40px;max-width:460px;width:90%;text-align:center}
.ico{font-size:60px;margin-bottom:20px}
h1{font-size:22px;color:#f1f5f9;margin-bottom:10px}
.reason-badge{display:inline-block;background:#0f172a;color:#64748b;font-size:12px;padding:4px 14px;border-radius:20px;margin-bottom:18px}
.msg{font-size:15px;color:#94a3b8;line-height:1.7;margin-bottom:28px}
.btn{background:#4f46e5;color:#fff;padding:11px 28px;border-radius:10px;text-decoration:none;font-size:14px;display:inline-block}
.footer{margin-top:24px;font-size:11px;color:#475569}
</style></head>
<body><div class="card">
  <div class="ico">🔒</div>
  <h1>النظام غير متاح حالياً</h1>
  <div class="reason-badge">{{ reason }}</div>
  <p class="msg">{{ message }}</p>
  <a href="tel:+201000000000" class="btn">📞 تواصل مع الدعم الفني</a>
  <div class="footer">GTech Academy ERP v2.0</div>
</div></body></html>
