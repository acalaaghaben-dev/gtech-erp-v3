<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="description" content="جيتك المطور ERP — أ. علاء غبن | 01014868778" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="جيتك ERP" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <link rel="icon" type="image/png" href="../icons/icon-72.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <title>جيتك المطور | G-Tech Developer ERP</title>
  <style>
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Cairo',-apple-system,BlinkMacSystemFont,sans-serif; background:#0d1117; color:#e6edf3; direction:rtl; -webkit-font-smoothing:antialiased; }
    #root { min-height:100vh; }
    /* Splash */
    #splash { position:fixed;inset:0;background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity 0.4s; }
    #splash .logo { font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#0066ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    #splash .sub  { color:#8b949e;font-size:0.9rem; }
    #splash .bar  { width:220px;height:3px;background:#21262d;border-radius:99px;overflow:hidden;margin-top:8px; }
    #splash .fill { height:100%;background:linear-gradient(90deg,#0066ff,#00d4ff);border-radius:99px;animation:load 1.8s ease-in-out forwards; }
    @keyframes load { from{width:0%} to{width:100%} }
    /* Scrollbars */
    ::-webkit-scrollbar { width:6px;height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#30363d;border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#484f58; }
  </style>
</head>
<body>
  <div id="splash">
    <div class="logo">جيتك ERP</div>
    <div class="sub">G-Tech Developer | أ. علاء غبن | 01014868778</div>
    <div class="bar"><div class="fill"></div></div>
  </div>
  <div id="root"></div>

  <script>
    // أول ما شريط التحميل (الأنيميشن) يخلص بعد 1.8 ثانية، السيستم هيحول تلقائياً لصفحة اللوجن
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => {
          splash.remove();
          // التوجيه لصفحة تسجيل الدخول الموجودة في الفولدر الرئيسي
          window.location.href = '../login.html';
        }, 400);
      }
    }, 1800);
  </script>
</body>
</html>
