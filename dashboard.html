<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | نظام GTech ERP v3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma; }
        .navbar { background-color: #2c3e50; color: white; }
        .card-stat { border-radius: 10px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        /* شاشة الحجب السوداء عند إيقاف الترخيص */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 99999;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
    </style>
</head>
<body>

<div id="lockScreen" style="display: none;">
    <div>
        <h1 class="display-4 text-danger mb-4">⚠️ تنبيه أمني</h1>
        <h3 class="mb-3">تم إيقاف صلاحية النسخة أو انتهى ترخيص الاستخدام!</h3>
        <p class="text-muted">يرجى التواصل مع الإدارة المطور البرمجي للنظام لتفعيل الحساب.</p>
    </div>
</div>

<div id="dashboardContent">
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand mb-0 h1">لوحة التحكم السحابية - GTech ERP</span>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
    </nav>

    <div class="container mt-5">
        <h2 id="welcomeMsg" class="mb-4 text-secondary">مرحباً بك...</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-stat bg-white p-4">
                    <h6 class="text-muted">إجمالي المبيعات اليومية</h6>
                    <h3 class="text-success">15,450 ج.م</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat bg-white p-4">
                    <h6 class="text-muted">الفواتير المعلقة</h6>
                    <h3 class="text-warning">3 فواتير</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat bg-white p-4">
                    <h6 class="text-muted">حالة الاتصال بالسيرفر</h6>
                    <h3 class="text-primary">مستقر ومتصل سحابياً</h3>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const S_URL = "https://ogetdkarapmizwypnufi.supabase.co";
    const S_KEY = "sb_publishable_jBqWfbMvTPqO0GyEuH1hGA_iJe_XBzq";
    const gtechSupabase = supabase.createClient(S_URL, S_KEY);

    async function checkLicense() {
        const tenantId = localStorage.getItem('current_tenant_id');
        if (!tenantId) { window.location.href = "login.html"; return; }

        try {
            // الفحص الصامت من السيرفر
            const { data: tenant, error } = await gtechSupabase
                .from('tenants')
                .select('is_active, company_name')
                .eq('id', tenantId)
                .single();

            if (error || !tenant || !tenant.is_active) {
                // لو قفلت العميل من السيرفر.. شاشة الحجب تظهر فوراً وتخفي السيستم
                document.getElementById('dashboardContent').style.display = 'none';
                document.getElementById('lockScreen').style.display = 'flex';
            } else {
                document.getElementById('welcomeMsg').innerText = `مرحباً بك في مؤسسة (${tenant.company_name}) 👋`;
            }
        } catch (err) { console.error(err); }
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }
    checkLicense();
    setInterval(checkLicense, 20000); // يفحص أوتوماتيك كل 20 ثانية من وراء ظهر العميل
</script>
</body>
</html>
